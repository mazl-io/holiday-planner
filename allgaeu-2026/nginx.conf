server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # index.html and source code: revalidate every time (browser sends If-Modified-Since)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
    }

    # Images / fonts: cache aggressively (these rarely change)
    location ~* \.(jpg|jpeg|png|webp|svg|woff2|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
